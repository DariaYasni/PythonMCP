[pytest]
# 1. Пути для импортов
pythonpath = .

# 2. Настройки запуска (Добавлена параллелизация и ретраи)
# -n 3: запуск в 3 потока
# --dist loadscope: группировка тестов по файлам
# --reruns 2: повтор при падении
addopts = --base-url https://mwtestconsultancy.co.uk -v -n 3 --dist loadscope --reruns 2 --alluredir=allure-results

# 3. Пути к тестам (Убедитесь, что папка указана верно!)
testpaths = tests/e2e_tests tests/API_tests

# 4. Настройки логирования
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %H:%M:%S